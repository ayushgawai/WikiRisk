version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# WikiRisk – Production docker-compose
# Services: MinIO  →  MLflow  →  API (FastAPI)  →  UI (Streamlit)
# Spark runs in local[*] mode inside the api container (no external cluster)
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  TZ: UTC
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}

networks:
  wikirisk:
    driver: bridge

volumes:
  minio_data:
  mlflow_db:

services:
  # ── MinIO (S3-compatible artifact store for MLflow) ──────────────────────
  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    container_name: wikirisk-minio
    command: server /data --console-address ":9001"
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_USER:-wikirisk}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-wikirisk123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - wikirisk
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── MinIO bucket init (one-shot) ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: wikirisk-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - wikirisk
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9000 ${MINIO_USER:-wikirisk} ${MINIO_PASSWORD:-wikirisk123};
        mc mb --ignore-existing minio/mlflow-artifacts;
        mc mb --ignore-existing minio/wikirisk-data;
        echo 'Buckets ready.';
      "
    restart: "no"

  # ── MLflow Tracking Server ───────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    container_name: wikirisk-mlflow
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-wikirisk}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-wikirisk123}
    ports:
      - "5001:5001"
    volumes:
      - mlflow_db:/mlflow
    networks:
      - wikirisk
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5001
      --serve-artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: wikirisk-api
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      <<: *common-env
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-wikirisk}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-wikirisk123}
      DATABASE_URL: sqlite:////app/data/wikirisk.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      WIKIMEDIA_STREAM_URL: https://stream.wikimedia.org/v2/stream/recentchange
      SPARK_MASTER: local[*]
      PREDICTIONS_DIR: /app/data/predictions
      STREAM_INPUT_DIR: /app/data/stream/incoming
      STREAM_CHECKPOINT_DIR: /app/data/stream/checkpoints
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./manifests:/app/manifests
    networks:
      - wikirisk
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Streamlit Dashboard ──────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    container_name: wikirisk-ui
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *common-env
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    networks:
      - wikirisk
    restart: unless-stopped

  # ── Stream Collector (SSE → file sink) ───────────────────────────────────
  collector:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: wikirisk-collector
    environment:
      <<: *common-env
      WIKIMEDIA_STREAM_URL: https://stream.wikimedia.org/v2/stream/recentchange
      STREAM_INPUT_DIR: /app/data/stream/incoming
      DATABASE_URL: sqlite:////app/data/wikirisk.db
    volumes:
      - ./data:/app/data
    networks:
      - wikirisk
    command: python -m src.streaming.collector
    restart: unless-stopped

  # ── Spark Structured Streaming Processor ─────────────────────────────────
  streaming:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: wikirisk-streaming
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *common-env
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-wikirisk}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-wikirisk123}
      DATABASE_URL: sqlite:////app/data/wikirisk.db
      SPARK_MASTER: local[*]
      STREAM_INPUT_DIR: /app/data/stream/incoming
      STREAM_CHECKPOINT_DIR: /app/data/stream/checkpoints
      PREDICTIONS_DIR: /app/data/predictions
    volumes:
      - ./data:/app/data
    networks:
      - wikirisk
    command: python -m src.streaming.processor
    restart: unless-stopped
